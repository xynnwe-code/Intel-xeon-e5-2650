<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT System v8 - Bright Liquid Glass</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        /* BAGIAN AWAL: Background diubah kembali menjadi PUTIH */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; font-family: 'Inter', sans-serif; 
            background: #ffffff; /* Kembali ke putih */
        }
        
        #exam-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 1; }

        /* --- BRIGHTER LIQUID GLASS SIDEBAR --- */
        #ai-sidebar {
            position: fixed; top: 15px; right: -360px; width: 340px; height: calc(100% - 30px);
            
            /* Diterangkan: Background transparan putih susu */
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(30px) saturate(200%); 
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            
            border-radius: 24px; 
            box-shadow: 
                0 15px 50px rgba(0,0,0,0.1), /* Shadow lebih halus karena BG putih */
                inset 0 0 0 1.5px rgba(255,255,255,0.8), 
                inset 0 10px 20px rgba(255,255,255,0.3); 
            
            transition: 0.5s cubic-bezier(0.23, 1, 0.32, 1); 
            z-index: 9999; display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05); /* Border tipis agar terlihat di BG putih */
        }

        #ai-sidebar::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.2) 100%);
            z-index: -1;
        }

        /* Header - Font Hitam Tajam */
        #ai-header { 
            padding: 20px 24px; color: #000; font-weight: 800; font-size: 13px; letter-spacing: 1px;
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
            background: rgba(255,255,255,0.5);
        }
        .status-dot { width: 7px; height: 7px; background: #00c853; border-radius: 50%; display: inline-block; margin-right: 10px; box-shadow: 0 0 10px #00c853; }
        
        /* Konten Chat - Font Hitam Tajam */
        #ai-content { 
            flex: 1; padding: 20px 24px; overflow-y: auto; font-size: 13px; 
            color: #000; line-height: 1.6; font-weight: 500;
            background: rgba(255,255,255,0.2);
        }
        #ai-content::-webkit-scrollbar { width: 0; }

        /* Input Area - Brighter */
        #ai-input-area { 
            padding: 15px 24px 20px 24px; display: flex; gap: 10px; align-items: center; 
            background: rgba(255,255,255,0.5); border-top: 1px solid rgba(0,0,0,0.05);
        }
        #ai-input { 
            flex: 1; background: rgba(255,255,255,0.9); border: 1px solid rgba(0,0,0,0.1); 
            border-radius: 14px; padding: 12px 16px; color: #000; outline: none; font-size: 13px; font-weight: 600;
        }
        #ai-input::placeholder { color: rgba(0,0,0,0.3); }
        
        .btn-send { 
            background: #000; color: #fff; border: none; padding: 12px 20px; 
            border-radius: 14px; font-weight: 800; font-size: 11px; cursor: pointer; transition: 0.3s;
        }
        .btn-send:hover { background: #333; }

        /* Floating Trigger */
        #sidebar-trigger { 
            position: fixed; top: 45%; right: 5px; width: 6px; height: 70px; 
            background: rgba(0,0,0,0.1); backdrop-filter: blur(5px);
            border-radius: 10px; z-index: 10000; cursor: pointer; border: 1px solid rgba(0,0,0,0.05);
        }

        /* Bubble Chat - Brighter Glass */
        .u-msg { color: rgba(0,0,0,0.5); font-size: 10px; margin-bottom: 6px; font-weight: 700; letter-spacing: 1px; }
        .ai-msg { 
            background: rgba(255,255,255,0.8); padding: 16px; border-radius: 16px; 
            border: 1px solid rgba(0,0,0,0.05); margin-bottom: 24px; color: #000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            font-weight: 500;
        }
    </style>
</head>
<body>

    <iframe id="exam-frame" src="https://smpam.site/aum/index.php"></iframe>

    <div id="sidebar-trigger" onclick="toggleSidebar()"></div>

    <div id="ai-sidebar">
        <div id="ai-header">
            <div><span class="status-dot"></span> GROQ BRIGHT v8</div>
            <span style="cursor:pointer; opacity: 0.8; font-size: 20px;" onclick="closeSidebar()">×</span>
        </div>
        <div id="ai-content">
            <p style="text-align: center; opacity: 0.5; margin-top: 50%; font-size: 11px; font-weight: 700; color: #000;">ALT + S to Toggle</p>
        </div>
        <div id="ai-input-area">
            <input type="text" id="ai-input" placeholder="Tulis soal..." autocomplete="off">
            <button class="btn-send" onclick="askGroq()">GO</button>
        </div>
    </div>

    <script>
        const GROQ_KEY = "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";

        window.addEventListener('blur', (e) => { e.stopImmediatePropagation(); }, true);
        Object.defineProperty(document, 'visibilityState', {get: () => 'visible'});
        Object.defineProperty(document, 'hidden', {get: () => false});

        document.addEventListener('keydown', (e) => {
            if (e.altKey && e.key.toLowerCase() === 's') toggleSidebar();
            if (e.key === 'Enter' && document.activeElement.id === 'ai-input') askGroq();
        });

        function toggleSidebar() {
            const sb = document.getElementById('ai-sidebar');
            sb.style.right === '15px' ? closeSidebar() : openSidebar();
        }

        function openSidebar() {
            document.getElementById('ai-sidebar').style.right = '15px';
            setTimeout(() => document.getElementById('ai-input').focus(), 500);
        }

        function closeSidebar() {
            document.getElementById('ai-sidebar').style.right = '-360px';
        }

        async function askGroq() {
            const input = document.getElementById('ai-input');
            const chat = document.getElementById('ai-content');
            const question = input.value.trim();
            if (!question) return;

            if(chat.querySelector('p')) chat.innerHTML = '';

            chat.innerHTML += `<div class="u-msg">SOAL:</div><div class="ai-msg" style="background: rgba(0,0,0,0.03);">${question}</div>`;
            input.value = "";
            const loadId = "ld-" + Date.now();
            chat.innerHTML += `<div id="${loadId}" style="color:#000; font-size: 11px; margin-bottom: 15px; font-weight: bold; opacity: 0.3;">• SEDANG MENGANALISA...</div>`;
            chat.scrollTop = chat.scrollHeight;

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: question }]
                    })
                });

                const data = await response.json();
                document.getElementById(loadId).remove();

                if (data.choices) {
                    const ans = data.choices[0].message.content;
                    chat.innerHTML += `<div class="u-msg">JAWABAN:</div><div class="ai-msg">${ans}</div>`;
                }
            } catch (e) {
                document.getElementById(loadId).innerHTML = "ERROR KONEKSI";
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
