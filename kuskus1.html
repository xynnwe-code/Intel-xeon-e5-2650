<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaizen AI - Stealth CBT White v8</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

        /* --- BACKGROUND DASAR --- */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; 
            font-family: 'Inter', sans-serif; 
            background: #ffffff; 
        }
        
        #exam-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 1; }

        /* --- UI GLASS PANEL (BRIGHT MODE) --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(30px) saturate(200%); 
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-radius: 28px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.06), inset 0 0 0 1px rgba(0,0,0,0.05); 
            z-index: 9999; display: flex; flex-direction: column; overflow: hidden;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #ai-sidebar { position: fixed; top: 15px; right: -400px; width: 350px; height: calc(100% - 30px); }
        #history-drawer { position: fixed; top: 15px; left: -400px; width: 300px; height: calc(100% - 30px); z-index: 10000; }

        /* Header Teks Gelap */
        .panel-header { 
            padding: 20px 24px; color: #1a1a1a; font-weight: 800; font-size: 11px; letter-spacing: 1.5px;
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0, 0, 0, 0.03); border-bottom: 1px solid rgba(0,0,0,0.05);
            text-transform: uppercase;
        }
        .status-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px rgba(34, 197, 94, 0.5); }
        
        /* Konten Chat */
        #ai-content, #history-list { flex: 1; padding: 20px 24px; overflow-y: auto; font-size: 13px; color: #1a1a1a; line-height: 1.6; scroll-behavior: smooth; }
        #ai-content::-webkit-scrollbar, #history-list::-webkit-scrollbar { width: 0; }

        .u-msg { color: #888; font-size: 10px; margin-bottom: 6px; font-weight: 700; text-transform: uppercase; }
        
        /* Bubble Chat Putih Lembut */
        .ai-msg { 
            background: #f1f3f5; 
            padding: 16px; 
            border-radius: 18px; 
            border: 1px solid rgba(0,0,0,0.03); 
            margin-bottom: 25px; 
            color: #1a1a1a; 
            font-weight: 500;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Input Area */
        #ai-input-area { padding: 15px 20px 25px 20px; display: flex; gap: 8px; background: rgba(0, 0, 0, 0.02); border-top: 1px solid rgba(0,0,0,0.05); }
        #ai-input { 
            flex: 1; background: #fff; border: 1px solid rgba(0,0,0,0.1); 
            border-radius: 14px; padding: 12px 15px; outline: none; font-size: 13px; color: #000;
        }
        
        .btn { background: #000; color: #fff; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .btn:hover { background: #333; }

        /* Riwayat Item */
        .history-item { 
            padding: 12px; background: rgba(0,0,0,0.02); border-radius: 12px; 
            margin-bottom: 10px; cursor: pointer; font-size: 12px; 
            border: 1px solid rgba(0,0,0,0.05); color: #1a1a1a;
        }
        .history-item:hover { background: rgba(0,0,0,0.05); }

        /* --- SIDEBAR TRIGGER TEBAL & TINGGI --- */
        #sidebar-trigger { 
            position: fixed; 
            top: 40%; 
            right: 0; 
            width: 12px; /* Ditebalkan */
            height: 100px; /* Ditinggikan */
            background: rgba(0, 0, 0, 0.15); 
            backdrop-filter: blur(5px);
            border-radius: 12px 0 0 12px; 
            z-index: 9998; 
            cursor: pointer; 
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
        #sidebar-trigger:hover {
            width: 18px; /* Efek membesar saat disentuh */
            background: rgba(0, 0, 0, 0.25);
        }

        @media (max-width: 768px) {
            #ai-sidebar { width: calc(100% - 30px); right: -120%; }
            #history-drawer { width: calc(100% - 30px); left: -120%; }
        }

        .typing::after { content: '▋'; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <iframe id="exam-frame" src="https://smpam.site/aum/index.php"></iframe>
    <div id="sidebar-trigger" onclick="toggleSidebar()"></div>

    <div id="history-drawer" class="glass-panel">
        <div class="panel-header">
            <div>RIWAYAT KAIZEN</div>
            <span style="cursor:pointer; font-size: 20px;" onclick="toggleHistory()">×</span>
        </div>
        <div id="history-list">
            <p style="text-align: center; opacity: 0.3; font-size: 10px; margin-top: 20px;">Belum ada riwayat</p>
        </div>
        <div style="padding: 15px;">
            <button class="btn" style="width: 100%; padding: 10px; background: rgba(200,0,0,0.05); color: #c00; font-size: 10px; border: 1px solid rgba(200,0,0,0.1);" onclick="clearHistory()">HAPUS SEMUA</button>
        </div>
    </div>

    <div id="ai-sidebar" class="glass-panel">
        <div class="panel-header">
            <div><span class="status-dot"></span> KAIZEN AI</div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <span style="cursor:pointer; opacity: 0.5;" onclick="toggleHistory()">🕒</span>
                <span style="cursor:pointer; opacity: 0.5; font-size: 20px;" onclick="closeSidebar()">×</span>
            </div>
        </div>
        <div id="ai-content"></div>
        <div id="ai-input-area">
            <input type="text" id="ai-input" placeholder="Tanya Kaizen..." autocomplete="off">
            <button class="btn" style="padding: 0 20px;" onclick="askGroq()">GO</button>
        </div>
    </div>

    <script>
        const GROQ_KEY = "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";
        let chatHistory = JSON.parse(localStorage.getItem('cbt_history')) || [];
        let hasGreeted = false; 
        
        let currentMessages = [
            { role: "system", content: "Nama kamu adalah Kaizen AI. Kamu adalah asisten ujian yang cerdas, tenang, dan membantu. Berikan jawaban yang akurat namun tetap ringkas agar mudah dibaca." }
        ];

        window.onload = renderHistory;

        // Anti-deteksi / Anti-blur
        window.addEventListener('blur', (e) => e.stopImmediatePropagation(), true);
        Object.defineProperty(document, 'visibilityState', {get: () => 'visible'});
        Object.defineProperty(document, 'hidden', {get: () => false});

        document.addEventListener('keydown', (e) => {
            if (e.altKey && e.key.toLowerCase() === 's') toggleSidebar();
            if (e.key === 'Enter' && document.activeElement.id === 'ai-input') askGroq();
        });

        function toggleSidebar() {
            const sb = document.getElementById('ai-sidebar');
            sb.style.right === '15px' ? closeSidebar() : openSidebar();
        }

        async function openSidebar() {
            const isMobile = window.innerWidth <= 768;
            if(isMobile) document.getElementById('history-drawer').style.left = '-120%';
            document.getElementById('ai-sidebar').style.right = '15px';
            
            if (!hasGreeted) {
                const welcomeMsg = "Halo! Saya **Kaizen AI**. Apa yang bisa saya bantu hari ini?";
                const div = document.createElement('div');
                div.className = 'ai-msg';
                document.getElementById('ai-content').appendChild(div);
                await typeWriter(welcomeMsg, div);
                hasGreeted = true;
            }
            setTimeout(() => document.getElementById('ai-input').focus(), 500);
        }

        function closeSidebar() {
            const isMobile = window.innerWidth <= 768;
            document.getElementById('ai-sidebar').style.right = isMobile ? '-120%' : '-400px';
            document.getElementById('history-drawer').style.left = isMobile ? '-120%' : '-400px';
        }

        function toggleHistory() {
            const dr = document.getElementById('history-drawer');
            const isMobile = window.innerWidth <= 768;
            if (dr.style.left === '15px') {
                dr.style.left = isMobile ? '-120%' : '-400px';
            } else {
                if(isMobile) document.getElementById('ai-sidebar').style.right = '-120%';
                dr.style.left = '15px';
            }
        }

        async function askGroq() {
            const input = document.getElementById('ai-input');
            const q = input.value.trim();
            if (!q) return;

            input.value = "";
            const chat = document.getElementById('ai-content');
            chat.innerHTML += `<div class="u-msg">Kamu:</div><div class="ai-msg" style="background:rgba(0,0,0,0.03);">${q}</div>`;
            
            const id = "ld-" + Date.now();
            chat.innerHTML += `<div id="${id}" style="font-size:10px; opacity:0.4; color:#000;">• Kaizen sedang berpikir...</div>`;
            chat.scrollTop = chat.scrollHeight;

            currentMessages.push({ role: "user", content: q });

            try {
                const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
                    body: JSON.stringify({ 
                        model: "llama-3.3-70b-versatile", 
                        messages: currentMessages, 
                        temperature: 0.6
                    })
                });

                const data = await res.json();
                document.getElementById(id).remove();
                
                const ans = data.choices[0].message.content;
                currentMessages.push({ role: "assistant", content: ans });

                const div = document.createElement('div');
                div.className = 'ai-msg';
                chat.appendChild(div);
                
                await typeWriter(ans, div);
                saveToHistory(q, ans);
                if(currentMessages.length > 15) currentMessages.splice(1, 2);

            } catch (e) { 
                document.getElementById(id).innerText = "ERROR: Gagal menghubungi Kaizen AI."; 
            }
        }

        function typeWriter(text, el) {
            return new Promise(res => {
                let i = 0; el.classList.add('typing');
                function t() {
                    if(i < text.length) { 
                        el.innerHTML = text.substring(0, i+1).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                        i++;
                        document.getElementById('ai-content').scrollTop = 99999; 
                        setTimeout(t, 10); 
                    }
                    else { el.classList.remove('typing'); res(); }
                } t();
            });
        }

        function saveToHistory(q, a) {
            chatHistory.unshift({ q, a, time: new Date().toLocaleTimeString() });
            if(chatHistory.length > 20) chatHistory.pop();
            localStorage.setItem('cbt_history', JSON.stringify(chatHistory));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            if (!chatHistory.length) return;
            list.innerHTML = "";
            chatHistory.forEach((item) => {
                const d = document.createElement('div');
                d.className = 'history-item';
                d.innerHTML = `<small style="opacity:0.5">${item.time}</small><br><strong>${item.q}</strong>`;
                d.onclick = () => {
                    const chat = document.getElementById('ai-content');
                    chat.innerHTML = `<div class="u-msg">Riwayat:</div><div class="ai-msg" style="background:rgba(0,0,0,0.03);">${item.q}</div><div class="u-msg">Kaizen AI:</div><div class="ai-msg">${item.a}</div>`;
                };
                list.appendChild(d);
            });
        }

        function clearHistory() { if(confirm('Hapus semua riwayat Kaizen?')) { localStorage.removeItem('cbt_history'); location.reload(); } }
    </script>
</body>
</html>
