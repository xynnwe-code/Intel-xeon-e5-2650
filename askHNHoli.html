<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRENDO_AI - HEXAGON ENGINE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap');

        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: #ffffff; }
        
        /* Iframe dikurangi tingginya agar tidak tertutup nav bar */
        #exam-frame { position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 65px); border: none; z-index: 1; }

        /* --- CSS BAR BARU (BOTTOM SYSTEM NAV) --- */
        .bottom-system-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 65px;
            background: #eef2f7; border-top: 1px solid #d1d9e6;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; box-sizing: border-box; z-index: 10001;
        }
        .nav-left { display: flex; flex-direction: column; font-family: 'JetBrains Mono'; font-size: 11px; color: #444; font-weight: bold; }
        .nav-time { font-size: 13px; margin-bottom: -2px; }
        .nav-bat-small { font-size: 9px; color: #888; }
        
        .nav-center { display: flex; gap: 45px; }
        .nav-icon-btn { font-size: 20px; color: #555; cursor: pointer; user-select: none; transition: 0.2s; }
        .nav-icon-btn.reload { color: #ff3b30; font-weight: bold; }
        
        .nav-right { display: flex; gap: 20px; align-items: center; }
        .nav-wifi { color: #22c55e; font-size: 18px; }
        .nav { color: #ff3b30; font-size: 22px; cursor: pointer; font-weight: bold; }
        /* ----------------------------------------- */

        .glass-panel {
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(30px) saturate(200%); 
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-radius: 35px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.1), inset 0 0 0 1px rgba(255,255,255,0.4); 
            z-index: 9999; display: flex; flex-direction: column; overflow: hidden;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Sidebar dikurangi tingginya sedikit agar tidak menabrak bar */
        #ai-sidebar { position: fixed; top: 15px; right: -450px; width: 360px; height: calc(100% - 90px); opacity: 0; transform: scale(0.98); }
        #history-drawer { position: fixed; top: 15px; left: -450px; width: 300px; height: calc(100% - 90px); z-index: 10000; opacity: 0; }

        #ai-sidebar.active { right: 15px; opacity: 1; transform: scale(1); }
        #history-drawer.active { left: 15px; opacity: 1; transform: scale(1); }
        
        .panel-header { 
            padding: 20px 25px; color: #1a1a1a; font-weight: 800; font-size: 10px; letter-spacing: 1px;
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0, 0, 0, 0.02); border-bottom: 1px solid rgba(0,0,0,0.05); text-transform: uppercase;
        }

        .engine-tag { font-family: 'JetBrains Mono', monospace; font-size: 8px; color: #555; background: #eee; padding: 2px 6px; border-radius: 4px; margin-left: 8px; vertical-align: middle; }
        .system-info { display: flex; gap: 10px; font-size: 9px; color: #888; margin-top: 8px; font-weight: 600; }
        .status-dot { width: 8px; height: 8px; background: #ff3b30; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px #ff3b30; transition: 0.3s; }
        
        #ai-content, #history-list { flex: 1; padding: 25px; overflow-y: auto; font-size: 13.5px; color: #1a1a1a; line-height: 1.7; scroll-behavior: smooth; }
        #ai-content::-webkit-scrollbar { width: 0; }

        .ai-msg { background: #ffffff; padding: 18px; border-radius: 22px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 22px; color: #1a1a1a; font-weight: 500; animation: popIn 0.4s ease-out forwards; position: relative; display: block; }
        .u-label { color:#bbb; font-size:10px; margin-top:15px; font-weight:800; text-transform:uppercase; letter-spacing:1px; }

        #ai-input-area { padding: 15px 20px 30px 20px; display: none; gap: 8px; background: rgba(0,0,0,0.02); border-top: 1px solid rgba(0,0,0,0.05); align-items: center; }
        #ai-input { flex: 1; background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: 18px; padding: 12px 15px; outline: none; font-size: 13px; }
        
        .btn { background: #000; color: #fff; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; padding: 10px 18px; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .btn-ocr { background: #22c55e; padding: 10px 12px; }
        .icon-btn { cursor:pointer; font-size: 18px; opacity: 0.4; transition: 0.3s; }
        #sidebar-trigger { position: fixed; top: 40%; right: 0; width: 10px; height: 100px; background: rgba(0, 0, 0, 0.15); border-radius: 12px 0 0 12px; z-index: 9998; cursor: pointer; }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        .typing::after { content: '▋'; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <iframe id="exam-frame" src="https://smpam.site/aum/index.php"></iframe>
    <div id="sidebar-trigger" onclick="toggleSidebar()"></div>

    <div id="history-drawer" class="glass-panel">
        <div class="panel-header"><div>RIWAYAT</div><span class="icon-btn" onclick="toggleHistory()">×</span></div>
        <div id="history-list"></div>
        <div style="padding: 20px;"><button class="btn" style="width: 100%; background: #ff3b30;" onclick="clearHistory()">HAPUS DATA</button></div>
    </div>

    <div id="ai-sidebar" class="glass-panel">
        <div class="panel-header" style="flex-direction: column; align-items: flex-start;">
            <div style="display: flex; justify-content: space-between; width: 100%;">
                <div><span class="status-dot" id="status-light"></span> FRENDO_AI <span class="engine-tag">HEXAGON 2.1</span></div>
                <div style="display: flex; gap: 15px;">
                    <span id="logout-btn" class="icon-btn" style="display:none;" title="Logout" onclick="logout()">🚪</span>
                    <span id="hist-btn" class="icon-btn" style="display:none;" onclick="toggleHistory()">🕒</span>
                    <span class="icon-btn" onclick="closeSidebar()">×</span>
                </div>
            </div>
            <div class="system-info">
                <span id="bat-val">🔋 --%</span>
                <span id="net-val"> SCANNING</span>
                <span style="margin-left: auto; color: #bbb;">V.2.1-PRO</span>
            </div>
        </div>
        
        <div id="ai-content">
            <div id="activation-panel" style="text-align: center; margin-top: 60px;">
                <div style="font-family: 'JetBrains Mono'; font-size: 11px; color: #000; margin-bottom: 5px;">HEXAGON ENGINE 2.1</div>
                <p style="font-size: 9px; font-weight: 800; color: #aaa; letter-spacing: 2px; margin-bottom: 20px;">ENCRYPTED ACCESS ONLY</p>
                <input type="text" id="license-key" style="width: 80%; padding: 15px; border-radius: 18px; border: 1px solid #eee; margin-bottom: 15px; text-align: center; outline: none; font-weight: 700; font-family: 'JetBrains Mono';" placeholder="LICENSE KEY">
                <button class="btn" style="width: 85%; margin: 0 auto;" onclick="checkLicense()">BOOSTRAP SYSTEM</button>
                <div class="corp-footer">FRENDO.CORPORATION.SYSTEMS</div>
            </div>
        </div>

        <div id="ai-input-area">
            <input type="file" id="ocr-upload" accept="image/*" style="display: none;" onchange="handleOCR(this)">
            <button class="btn btn-ocr" onclick="document.getElementById('ocr-upload').click()" title="OCR SCAN">📷</button>
            <input type="text" id="ai-input" placeholder="Input query..." autocomplete="off">
            <button class="btn" onclick="askGroq()">↑</button>
        </div>
    </div>

    <div class="bottom-system-nav">
        <div class="nav-left">
            <span class="nav-time" id="sys-time">00:00:00</span>
            <span class="nav-bat-small" id="sys-bat">🔋 --%</span>
        </div>
        <div class="nav-center">
            <div class="nav-icon-btn" onclick="window.history.back()">❮</div>
            <div class="nav-icon-btn reload" onclick="location.reload()">↻</div>
            <div class="nav-icon-btn" onclick="window.history.forward()">❯</div>
        </div>
        <div class="nav-right">
            <span class="nav-wifi">-</span>
            <span class="nav-power" onclick="logout()">O</span>
        </div>
    </div>

    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>

    <script>
        const GROQ_KEY = "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";
        const LICENSE_DB = { "FRENDO ADMIN": "A", "FRENDO VIP": "V", "FRENDO FINAL": "F" };
        
        let chatHistory = JSON.parse(localStorage.getItem('frendo_history')) || [];
        let currentConvo = [{role: "system", content: "Kamu adalah FRENDO_AI yang berjalan di atas HEXAGON ENGINE 2.1. Jawab pertanyaan dengan sangat efisien, singkat, dan langsung pada intinya untuk membantu ujian."}];

        // LOGIKA BARU UNTUK NAV BAR BAWAH
        function startLiveSystem() {
            setInterval(() => {
                const now = new Date();
                document.getElementById('sys-time').innerText = now.toTimeString().split(' ')[0];
            }, 1000);

            if (navigator.getBattery) {
                navigator.getBattery().then(bat => {
                    const update = () => {
                        const level = Math.round(bat.level * 100) + '%';
                        document.getElementById('sys-bat').innerText = `🔋 ${level}`;
                        document.getElementById('bat-val').innerText = `🔋 ${level}`;
                    };
                    update();
                    bat.addEventListener('levelchange', update);
                });
            }
        }

        function updateSystemInfo() {
            const updateNet = () => {
                const status = navigator.onLine ? "ONLINE" : "OFFLINE";
                document.getElementById('net-val').innerText = `- ${status}`;
                document.getElementById('net-val').style.color = navigator.onLine ? "#22c55e" : "#ff3b30";
            };
            updateNet();
            window.addEventListener('online', updateNet);
            window.addEventListener('offline', updateNet);
        }

        async function handleOCR(input) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];
            const chat = document.getElementById('ai-content');
            const loader = document.createElement('div');
            loader.className = 'ai-msg';
            loader.style.fontSize = '11px';
            loader.style.fontFamily = 'JetBrains Mono';
            loader.innerHTML = `[HEXAGON] SCANNING BUFFER...`;
            chat.appendChild(loader);
            chat.scrollTop = chat.scrollHeight;

            try {
                const result = await Tesseract.recognize(file, 'ind+eng');
                const text = result.data.text.trim();
                loader.remove();
                if (text) {
                    document.getElementById('ai-input').value = text;
                    askGroq();
                } else { alert("Data korup."); }
            } catch (e) { loader.innerText = "OCR ERROR."; }
        }

        function checkLicense() {
            const key = document.getElementById('license-key').value.trim().toUpperCase();
            if (LICENSE_DB[key]) {
                localStorage.setItem('frendo_auth', key);
                unlockAI();
            } else { alert("ACCESS DENIED!"); }
        }

        function unlockAI() {
            document.getElementById('activation-panel').style.display = 'none';
            document.getElementById('ai-input-area').style.display = 'flex';
            document.getElementById('hist-btn').style.display = 'block';
            document.getElementById('logout-btn').style.display = 'block';
            document.getElementById('status-light').style.background = '#22c55e';
            document.getElementById('status-light').style.boxShadow = '0 0 15px #22c55e';
            if (document.querySelectorAll('.ai-msg').length === 0) createMsg('ai', "HEXAGON ENGINE 2.1 INITIALIZED.");
        }

        function logout() {
            if(confirm("Terminate session?")) {
                localStorage.removeItem('frendo_auth');
                location.reload();
            }
        }

        function createMsg(type, text) {
            const chat = document.getElementById('ai-content');
            const label = document.createElement('div');
            label.className = 'u-label'; label.innerText = type === 'ai' ? 'FRENDO_AI:' : 'YOU:';
            const div = document.createElement('div');
            div.className = 'ai-msg';
            if(type === 'user') div.style.background = "rgba(0,0,0,0.04)";
            chat.appendChild(label); chat.appendChild(div);
            
            if(type === 'ai') {
                let i = 0; div.classList.add('typing');
                function t() {
                    if(i < text.length) {
                        div.innerHTML = text.substring(0, i+4).replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                        i += 4; chat.scrollTop = chat.scrollHeight; setTimeout(t, 1);
                    } else { div.classList.remove('typing'); }
                } t();
            } else { div.innerText = text; chat.scrollTop = chat.scrollHeight; }
        }

        async function askGroq() {
            const input = document.getElementById('ai-input');
            const q = input.value.trim(); if(!q) return;
            input.value = ""; createMsg('user', q);
            currentConvo.push({role: "user", content: q});
            const chat = document.getElementById('ai-content');
            const loader = document.createElement('div');
            loader.innerHTML = `<div style="font-size:9px; font-family:'JetBrains Mono'; opacity:0.5; margin-bottom:20px;">[HEXAGON] PROCESSING...</div>`;
            chat.appendChild(loader);

            try {
                const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: currentConvo, temperature: 0.2 })
                });
                const data = await res.json();
                loader.remove();
                const ans = data.choices[0].message.content;
                currentConvo.push({role: "assistant", content: ans});
                createMsg('ai', ans);
                saveToHistory(q, ans);
            } catch(e) { loader.innerText = "ENGINE TIMEOUT."; }
        }

        function saveToHistory(q, a) {
            chatHistory.unshift({ q, a });
            if(chatHistory.length > 15) chatHistory.pop();
            localStorage.setItem('frendo_history', JSON.stringify(chatHistory));
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = chatHistory.map(item => `<div style='padding:12px; background:rgba(0,0,0,0.02); border-radius:15px; margin-bottom:10px; font-size:11px; font-family:JetBrains Mono;'>[LOG]: ${item.q.substring(0,35)}...</div>`).join('');
        }

        function toggleSidebar() { 
            document.getElementById('ai-sidebar').classList.toggle('active');
            updateSystemInfo();
            const auth = localStorage.getItem('frendo_auth');
            if(auth && LICENSE_DB[auth]) unlockAI();
        }
        function toggleHistory() { document.getElementById('history-drawer').classList.toggle('active'); renderHistory(); }
        function closeSidebar() { document.getElementById('ai-sidebar').classList.remove('active'); }
        function clearHistory() { localStorage.removeItem('frendo_history'); chatHistory = []; renderHistory(); }

        document.addEventListener('keydown', (e) => {
            if (e.altKey && e.key.toLowerCase() === 's') toggleSidebar();
            if (e.key === 'Enter' && document.activeElement.id === 'ai-input') askGroq();
        });

        window.onload = () => {
            startLiveSystem();
            updateSystemInfo();
            if(localStorage.getItem('frendo_auth')) unlockAI();
        };
    </script>
</body>
</html>
